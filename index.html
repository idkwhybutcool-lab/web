<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>grunvhaze</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #008080;
  font-family: Tahoma, Verdana, sans-serif;
  overflow: hidden;
}

/* ===== DESKTOP ===== */
.desktop {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 28px; /* exact Win98 taskbar height */
  padding: 20px;
  display: flex;
  flex-direction: column;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 28px;
}

/* ===== ICONS ===== */
.desktop-icon {
  width: 90px;
  text-align: center;
  color: white;
  text-decoration: none;
  font-size: 13px;
}

.desktop-icon img {
  width: 48px;
  height: 48px;
  image-rendering: pixelated;
  margin-bottom: 6px;
}

.desktop-icon span {
  display: block;
  padding: 2px 4px;
}

.desktop-icon:hover span {
  background: #000080;
}

/* ===== TASKBAR ===== */
.taskbar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 28px;
  background: #c0c0c0;
  border-top: 2px solid #ffffff;
  display: flex;
  align-items: center;
  padding: 2px;
  box-sizing: border-box;
}

/* Left button (Start style) */
.taskbar-button {
  background: #c0c0c0;
  border: 2px solid;
  border-color: #ffffff #404040 #404040 #ffffff;
  padding: 2px 10px;
  font-weight: bold;
  font-size: 13px;
  margin-right: 6px;
  cursor: default;
}

.taskbar-button:active {
  border-color: #404040 #ffffff #ffffff #404040;
}

/* Middle clickable area */
.taskbar-link {
  background: #c0c0c0;
  border: 2px solid;
  border-color: #ffffff #808080 #808080 #ffffff;
  padding: 2px 12px;
  font-size: 13px;
  margin-right: auto;
  text-decoration: none;
  color: black;
}

.taskbar-link:active {
  border-color: #808080 #ffffff #ffffff #808080;
}

/* Clock box */
.clock-box {
  background: #c0c0c0;
  border: 2px solid;
  border-color: #808080 #ffffff #ffffff #808080;
  padding: 2px 8px;
  font-size: 13px;
}
</style>
</head>

<body>

<!-- DESKTOP -->
<div class="desktop">

  <a class="desktop-icon" href="https://open.spotify.com/artist/7aHdvxqX9ccCI1lozcRbdN" target="_blank">
    <img src="spotify.png">
    <span>spotify</span>
  </a>

  <a class="desktop-icon" href="https://music.apple.com/us/artist/grunvhaze/1873239417" target="_blank">
    <img src="applemusic.png">
    <span>apple music</span>
  </a>

  <a class="desktop-icon" href="https://soundcloud.com/grunvhaze" target="_blank">
    <img src="soundcloud.png">
    <span>soundcloud</span>
  </a>

  <a class="desktop-icon" href="https://music.youtube.com/channel/UCYtKMh32mafCvK5OGe6XwCQ" target="_blank">
    <img src="youtube.png">
    <span>youtube</span>
  </a>

  <a class="desktop-icon" href="https://www.instagram.com/grunvhazey/" target="_blank">
    <img src="instagram.png">
    <span>instagram</span>
  </a>

  <a class="desktop-icon" href="https://www.tiktok.com/@grunvhaze" target="_blank">
    <img src="tiktok.png">
    <span>tiktok</span>
  </a>

  <a class="desktop-icon" href="https://grunvhaze.bandcamp.com/" target="_blank">
    <img src="cd.png">
    <span>i'm still here cd</span>
  </a>

</div>

<!-- TASKBAR -->
<div class="taskbar">

  <div class="taskbar-button">
    grunvhaze
  </div>

  <a class="taskbar-link" 
     href="https://open.spotify.com/album/1LknkoA71lK1sj9SJUcxFZ?si=QUB9bdAST--Qb5IQZPZHCA" 
     target="_blank">
    stream "i'm still here"
  </a>

  <div class="clock-box">
    © grunvhaze
  </div>

</div>

</body>
</html>
