<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>grunvhaze</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, Helvetica, sans-serif;
  scroll-behavior: smooth;
  overflow-x: hidden;
  background: black;
}

/* ===== HERO SECTION ===== */
.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
}

/* Background image layer */
.hero-bg {
  position: absolute;
  inset: 0;
  background: url("background.jpg") center center / cover no-repeat; /* change filename if needed */
  filter: blur(4px);
  transform: scale(1.08);
  z-index: 1;
}

/* Content above background */
.hero-content {
  position: relative;
  z-index: 2;
}

/* Fade animations */
.fade-in {
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

.fade-in-delay {
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 1.5s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* ===== TITLE STYLE ===== */
.hero h1 {
  font-size: clamp(40px, 8vw, 90px);
  margin: 0;
  font-weight: 300;
  letter-spacing: 2px;

  /* Glow */
  text-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 20px rgba(255,255,255,0.6),
    0 0 40px rgba(255,255,255,0.4);
}

/* Crooked letter effect */
.crooked span {
  display: inline-block;
  margin: 0 -2px;
}

.crooked span:nth-child(1) { transform: rotate(-5deg) translateY(-2px); }
.crooked span:nth-child(2) { transform: rotate(3deg) translateY(1px); }
.crooked span:nth-child(3) { transform: rotate(-4deg) translateY(-1px); }
.crooked span:nth-child(4) { transform: rotate(4deg) translateY(2px); }
.crooked span:nth-child(5) { transform: rotate(-2deg) translateY(-1px); }
.crooked span:nth-child(6) { transform: rotate(3deg) translateY(1px); }
.crooked span:nth-child(7) { transform: rotate(-3deg) translateY(-2px); }
.crooked span:nth-child(8) { transform: rotate(5deg) translateY(1px); }
.crooked span:nth-child(9) { transform: rotate(-4deg) translateY(-1px); }

/* Scroll text */
.scroll-text {
  margin-top: 25px;
  font-size: 14px;
  letter-spacing: 3px;
  cursor: pointer;
  opacity: 0.8;
  transition: opacity 0.3s ease;
}

.scroll-text:hover {
  opacity: 1;
}

/* ===== LINKS SECTION ===== */
.links-section {
  min-height: 100vh;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 30px;
}

.links-section a {
  color: white;
  text-decoration: none;
  font-size: 24px;
  letter-spacing: 4px;
  transition: opacity 0.3s ease;
}

.links-section a:hover {
  opacity: 0.6;
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <h1 class="fade-in crooked">
      <span>g</span>
      <span>r</span>
      <span>u</span>
      <span>n</span>
      <span>v</span>
      <span>h</span>
      <span>a</span>
      <span>z</span>
      <span>e</span>
    </h1>

    <div class="scroll-text fade-in-delay"
         onclick="document.getElementById('links').scrollIntoView();">
      scroll ↓
    </div>
  </div>
</section>

<section id="links" class="links-section">
  <a href="https://open.spotify.com/artist/7aHdvxqX9ccCI1lozcRbdN" target="_blank">spotify</a>
  <a href="https://music.apple.com/us/artist/grunvhaze/1873239417" target="_blank">apple music</a>
  <a href="https://soundcloud.com/grunvhaze" target="_blank">soundcloud</a>
  <a href="https://music.youtube.com/channel/UCYtKMh32mafCvK5OGe6XwCQ" target="_blank">youtube</a>
  <a href="https://www.instagram.com/grunvhazey/" target="_blank">instagram</a>
  <a href="https://www.tiktok.com/@grunvhaze" target="_blank">tiktok</a>
</section>

</body>
</html>
