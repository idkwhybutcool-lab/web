<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>grunvhaze</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== WINDOWS 98 BASE ===== */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #008080; /* classic win98 teal */
  font-family: Tahoma, Verdana, sans-serif;
  overflow: hidden;
}

/* ===== DESKTOP AREA ===== */
.desktop {
  height: calc(100vh - 40px);
  padding: 20px;
  display: flex;
  flex-direction: column;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 28px;
}

/* ===== ICON STYLE ===== */
.desktop-icon {
  width: 90px;
  text-align: center;
  color: white;
  text-decoration: none;
  font-size: 13px;
}

.desktop-icon img {
  width: 48px;
  height: 48px;
  image-rendering: pixelated;
  margin-bottom: 6px;
}

.desktop-icon span {
  display: block;
  padding: 2px 4px;
}

.desktop-icon:hover span {
  background: #000080;
}

/* ===== TASKBAR ===== */
.taskbar {
  height: 40px;
  background: #c0c0c0;
  border-top: 2px solid #ffffff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 6px;
  box-sizing: border-box;
}

/* START BUTTON */
.start-button {
  background: #c0c0c0;
  border: 2px solid;
  border-color: #ffffff #404040 #404040 #ffffff;
  padding: 4px 12px;
  font-weight: bold;
  font-size: 14px;
  cursor: default;
}

.start-button:active {
  border-color: #404040 #ffffff #ffffff #404040;
}

/* CENTER TEXT (like task button area) */
.taskbar-center {
  flex: 1;
  text-align: left;
  padding-left: 20px;
  font-size: 14px;
}

/* RIGHT SIDE CLOCK AREA */
.taskbar-right {
  border: 2px solid;
  border-color: #404040 #ffffff #ffffff #404040;
  padding: 4px 10px;
  font-size: 14px;
  background: #c0c0c0;
}
</style>
</head>

<body>

<!-- DESKTOP ICONS -->
<div class="desktop">

  <a class="desktop-icon" href="https://open.spotify.com/artist/7aHdvxqX9ccCI1lozcRbdN" target="_blank">
    <img src="spotify.png">
    <span>spotify</span>
  </a>

  <a class="desktop-icon" href="https://music.apple.com/us/artist/grunvhaze/1873239417" target="_blank">
    <img src="applemusic.png">
    <span>apple music</span>
  </a>

  <a class="desktop-icon" href="https://soundcloud.com/grunvhaze" target="_blank">
    <img src="soundcloud.png">
    <span>soundcloud</span>
  </a>

  <a class="desktop-icon" href="https://music.youtube.com/channel/UCYtKMh32mafCvK5OGe6XwCQ" target="_blank">
    <img src="youtube.png">
    <span>youtube</span>
  </a>

  <a class="desktop-icon" href="https://www.instagram.com/grunvhazey/" target="_blank">
    <img src="instagram.png">
    <span>instagram</span>
  </a>

  <a class="desktop-icon" href="https://www.tiktok.com/@grunvhaze" target="_blank">
    <img src="tiktok.png">
    <span>tiktok</span>
  </a>

  <!-- CD APP -->
  <a class="desktop-icon" href="https://grunvhaze.bandcamp.com/" target="_blank">
    <img src="cd.png">
    <span>i'm still here cd</span>
  </a>

</div>

<!-- TASKBAR -->
<div class="taskbar">

  <div class="start-button">
    Start
  </div>

  <div class="taskbar-center">
    stream "i'm still here"
  </div>

  <div class="taskbar-right">
    © grunvhaze
  </div>

</div>

</body>
</html>
