<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>grunvhaze</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="grunvhaze — music, links" />

<link rel="icon" href="twaf.jpg" type="image/jpeg">
<link rel="apple-touch-icon" href="profile.jpg">

<style>
@font-face {
  font-family: "px437";
  src: url("Px437_DOS-V_re_ANK30.otf") format("opentype");
  font-weight: normal;
  font-style: normal;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background-color: #ffffff;
  font-family: "px437", monospace;
  color: #000;
  text-transform: lowercase;

  /* crisp pixel rendering */
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: grayscale;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.content {
  flex: 1 0 auto;
  padding: 28px;
}

.container { 
  max-width: 900px; 
  margin: 0 auto; 
}

.profile { 
  width: 200px; 
  height: 200px; 
  background-color: #ffffff; 
  overflow: visible; 
}

.profile img { 
  width: 100%; 
  height: 100%; 
  transform: translateX(-20px); 
  image-rendering: pixelated;
}

h1 { 
  font-size: 44px; 
  margin: 0 0 14px 0; 
  letter-spacing: 0.25em; 
  text-decoration-line: underline; 
  text-decoration-thickness: 2px; 
  text-underline-offset: 7px; 
  text-decoration-color: #000; 
  font-weight: normal;
}

/* classic blue link style */
a {
  color: #0000cc;
  text-decoration: underline;
}

.release { 
  font-size: 20px; 
  display: block; 
  margin-bottom: 10px; 
}

.divider { 
  margin: 32px 0; 
  border-top: 1px solid #999; 
}

.links { 
  font-size: 24px; 
  letter-spacing: 0.05em; 
}

.link-block { 
  margin-bottom: 20px; 
}

@media (min-width: 700px) {
  .layout { 
    display: grid; 
    grid-template-columns: 180px 1fr; 
    gap: 32px; 
    align-items: start; 
  }
}

/* bottom CD */
.bottom-cd {
  flex-shrink: 0;
  text-align: center;
  padding: 20px 0;
  background: transparent;
}

.cd-images {
  display: flex;
  justify-content: center;
  gap: 0px;
  margin-bottom: 12px;
}

.cd-images img {
  width: 190px;
  max-width: 75vw;
  height: auto;
  display: block;
  image-rendering: pixelated;
}

.cd-price {
  font-size: 20px;
  letter-spacing: 0.08em;
}
</style>
</head>

<body>

<div class="content">
  <div class="container">
    <div class="layout">
      <div class="profile">
        <img src="profile.jpg" alt="grunvhaze profile" />
      </div>
      <div>
        <h1>grunvhaze</h1>
        <a class="release" href="https://distrokid.com/hyperfollow/grunvhaze/im-still-here?ref=release" target="_blank">
          pre save "i'm still here" - debut album
        </a>
        <div class="divider"></div>
        <div class="links">
          <div class="link-block"><a href="https://open.spotify.com/artist/7aHdvxqX9ccCI1lozcRbdN" target="_blank">spotify</a></div>
          <div class="link-block"><a href="https://soundcloud.com/grunvhaze" target="_blank">soundcloud</a></div>
          <div class="link-block"><a href="https://music.youtube.com/channel/UCYtKMh32mafCvK5OGe6XwCQ" target="_blank">youtube</a></div>
          <div class="link-block"><a href="https://www.instagram.com/grunvhazey/" target="_blank">instagram</a></div>
          <div class="link-block"><a href="https://www.tiktok.com/@grunvhaze" target="_blank">tiktok</a></div>
          <div class="link-block"><a href="https://music.apple.com/us/artist/grunvhaze/1873239417" target="_blank">apple music</a></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- bottom CD -->
<div class="bottom-cd">
  <a href="https://grunvhaze.bandcamp.com/" target="_blank">
    <div class="cd-images">
      <img src="ishcd.png" alt="i'm still here cd" />
      <img src="ishcd2.png" alt="i'm still here cd alt" />
    </div>
    <div class="cd-price">i'm still here cd | $10 | available 3/3/2026</div>
  </a>
</div>

</body>
</html>
