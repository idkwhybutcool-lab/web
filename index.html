<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>grunvhaze</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, Helvetica, sans-serif;
  scroll-behavior: smooth;
  overflow-x: hidden;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

/* Background image layer */
.hero-bg {
  position: absolute;
  inset: 0;
  background: url("background.jpg") center center / cover no-repeat;
  filter: blur(4px);
  transform: scale(1.08); /* prevents blur edges */
  z-index: 1;
}

/* Content above blur */
.hero-content {
  position: relative;
  z-index: 2;
}

/* Fade in animation */
.fade-in {
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

.fade-in-delay {
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 1.5s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.hero h1 {
  font-size: clamp(40px, 8vw, 80px);
  letter-spacing: 8px;
  margin: 0;
  font-weight: 300;

  /* GLOW EFFECT */
  text-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 20px rgba(255,255,255,0.6),
    0 0 40px rgba(255,255,255,0.4);
}
  
.scroll-text {
  margin-top: 20px;
  font-size: 14px;
  letter-spacing: 3px;
  cursor: pointer;
}

/* ===== LINKS SECTION ===== */
.links-section {
  min-height: 100vh;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 30px;
}

.links-section a {
  color: white;
  text-decoration: none;
  font-size: 24px;
  letter-spacing: 4px;
  transition: opacity 0.3s ease;
}

.links-section a:hover {
  opacity: 0.6;
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <h1 class="fade-in">grunvhaze</h1>
    <div class="scroll-text fade-in-delay" onclick="document.getElementById('links').scrollIntoView();">
      scroll ↓
    </div>
  </div>
</section>

<section id="links" class="links-section">
  <a href="https://open.spotify.com/artist/7aHdvxqX9ccCI1lozcRbdN" target="_blank">spotify</a>
  <a href="https://music.apple.com/us/artist/grunvhaze/1873239417" target="_blank">apple music</a>
  <a href="https://soundcloud.com/grunvhaze" target="_blank">soundcloud</a>
  <a href="https://music.youtube.com/channel/UCYtKMh32mafCvK5OGe6XwCQ" target="_blank">youtube</a>
  <a href="https://www.instagram.com/grunvhazey/" target="_blank">instagram</a>
  <a href="https://www.tiktok.com/@grunvhaze" target="_blank">tiktok</a>
</section>

</body>
</html>
